<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel de Desempenho — EEEFM ANTONIO DOS SANTOS NEVES</title>
<style>
:root{--bg:#f0f4f8;--card:#fff;--hdr:#1e3a5f;--acc:#2980b9;--bdr:#d1dce8;--txt:#2c3e50;--mut:#7f8c8d}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--txt)}
.topbar{background:var(--hdr);color:#fff;padding:14px 22px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.topbar h1{font-size:16px;font-weight:700;line-height:1.3}
.topbar small{font-size:11px;opacity:.7}
.filters{background:var(--card);padding:13px 22px;display:flex;flex-wrap:wrap;gap:14px;align-items:flex-end;border-bottom:2px solid var(--bdr);position:sticky;top:0;z-index:100;box-shadow:0 2px 6px rgba(0,0,0,.07)}
.fg{display:flex;flex-direction:column;gap:3px}
.fg label{font-size:10px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.5px}
select{border:1.5px solid var(--bdr);border-radius:6px;padding:6px 10px;font-size:13px;color:var(--txt);background:#fff;cursor:pointer;min-width:145px}
select:focus{outline:none;border-color:var(--acc)}
/* Avaliação toggle */
.aval-toggle{display:flex;gap:0;border-radius:8px;overflow:hidden;border:1.5px solid var(--bdr)}
.aval-btn{padding:7px 16px;font-size:12px;font-weight:700;cursor:pointer;border:none;background:#f0f4f8;color:var(--mut);transition:all .15s;white-space:nowrap}
.aval-btn.active-diag{background:#1e3a5f;color:#fff}
.aval-btn.active-ama{background:#8e44ad;color:#fff}
.aval-btn:not(.active-diag):not(.active-ama):hover{background:#e2e8f0}
/* Cards */
.summary{display:flex;gap:10px;padding:13px 22px;flex-wrap:wrap}
.card{background:var(--card);border-radius:10px;padding:11px 15px;flex:1;min-width:110px;box-shadow:0 1px 4px rgba(0,0,0,.08);border-left:4px solid var(--acc)}
.card.warn{border-left-color:#e74c3c}.card.ok{border-left-color:#27ae60}.card.mid{border-left-color:#e67e22}.card.ama{border-left-color:#8e44ad}
.card-val{font-size:24px;font-weight:800;color:var(--hdr)}
.card-lbl{font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.4px;margin-top:2px}
/* Layout */
.main{padding:0 22px 30px}
.tabs{display:flex;gap:3px;padding:13px 0 0}
.tab{padding:7px 16px;border-radius:8px 8px 0 0;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid var(--bdr);border-bottom:none;background:#e8edf2;color:var(--mut);transition:all .15s}
.tab.active{background:var(--card);color:var(--hdr)}
.table-wrap{background:var(--card);border-radius:0 10px 10px 10px;border:1.5px solid var(--bdr);overflow:auto;max-height:66vh}
.legend{display:flex;gap:10px;align-items:center;padding:8px 0 4px;flex-wrap:wrap;font-size:11px;color:var(--mut)}
.ldot{width:13px;height:13px;border-radius:3px;display:inline-block;vertical-align:middle;margin-right:2px}
/* Table */
table{border-collapse:collapse;width:100%;font-size:12px}
th{background:var(--hdr);color:#fff;padding:9px 10px;text-align:center;position:sticky;top:0;z-index:10;white-space:nowrap;font-size:11px;border-right:1px solid rgba(255,255,255,.15)}
th.left{text-align:left;min-width:150px;position:sticky;left:0;z-index:20}
td{padding:8px 9px;text-align:center;border-bottom:1px solid var(--bdr);border-right:1px solid var(--bdr);font-size:12px;font-weight:600}
td.left{text-align:left;font-weight:700;font-size:12px;position:sticky;left:0;background:#fff;z-index:5;border-right:2px solid var(--bdr);white-space:nowrap}
tr:hover td{filter:brightness(.96)}
tr:hover td.left{background:#f5f8fb}
/* Badge */
.badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:800;letter-spacing:.3px}
.badge-diag{background:#dbeafe;color:#1e3a5f}
.badge-ama{background:#ede9fe;color:#6d28d9}
/* Bar */
.bar-outer{background:#eaecef;border-radius:4px;height:18px;overflow:hidden;position:relative;min-width:110px}
.bar-inner{height:100%;border-radius:4px}
.bar-label{position:absolute;right:5px;top:1px;font-size:11px;font-weight:700;color:#2c3e50}
/* Ranking */
.ranking{padding:0}
.rrow{display:flex;align-items:center;gap:10px;padding:9px 16px;border-bottom:1px solid var(--bdr);transition:background .1s}
.rrow:hover{background:#f5f8fb}
.rnum{font-size:16px;font-weight:900;color:var(--bdr);min-width:28px;text-align:right}
.rnum.top{color:#d68910}
.rinfo{flex:1}.rturma{font-size:13px;font-weight:700}.rsub{font-size:10px;color:var(--mut);margin-top:1px}
.rbar{flex:2}
/* Descriptor grid */
.dgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:9px;padding:13px}
.dcard{border-radius:8px;padding:10px 12px;background:#f8fafc;border:1.5px solid var(--bdr)}
.dcode{font-size:12px;font-weight:800;color:var(--hdr)}
.dbars{margin-top:6px;display:flex;flex-direction:column;gap:4px}
.drow{display:flex;align-items:center;gap:5px;font-size:11px}
.dname{min-width:90px;color:var(--mut);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dtrack{flex:1;height:10px;background:#e8edf2;border-radius:3px;overflow:hidden}
.dfill{height:100%;border-radius:3px}
.dval{min-width:28px;text-align:right;font-weight:700}
.empty{padding:60px;text-align:center;color:var(--mut);font-size:15px}
.hidden{display:none!important}
</style>
</head>

    <span><span class="badge badge-ama">AMA</span></span>
  </div>
  <div class="table-wrap">
    <div id="vheat"></div>

</div>

  const srt=document.getElementById('fsort').value;
  let d=DATA.filter(r=>
    (!curAval||r.avaliacao===curAval)&&
    (!ano||r.ano===ano)&&
    (!comp||r.comp===comp)&&
    (fil==='all'||(fil==='below60'&&r.pct_medio<60)||(fil==='above60'&&r.pct_medio>=60))
  );
  if(srt==='turma')d.sort((a,b)=>a.turma.localeCompare(b.turma));
  else if(srt==='asc')d.sort((a,b)=>a.pct_medio-b.pct_medio);
  else d.sort((a,b)=>b.pct_medio-a.pct_medio);
  return d;
}

function populateFilters(){
  const anos=[...new Set(DATA.map(d=>d.ano))].sort((a,b)=>ANO_ORDER.indexOf(a)-ANO_ORDER.indexOf(b));
  const comps=[...new Set(DATA.map(d=>d.comp))].sort();
  const sa=document.getElementById('fano');
  anos.forEach(a=>{const o=document.createElement('option');o.value=a;o.textContent=a;sa.appendChild(o)});
  const sc=document.getElementById('fcomp');
  comps.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c+(COMP_NAMES[c]?' — '+COMP_NAMES[c]:'');sc.appendChild(o)});
}

function renderSummary(data){
  const total=data.length;
  const b60=data.filter(d=>d.pct_medio<60).length;
  const a75=data.filter(d=>d.pct_medio>=75).length;
  const avg=total?Math.round(data.reduce((s,d)=>s+d.pct_medio,0)/total):0;
  const nAMA=data.filter(d=>d.avaliacao==='AMA').length;
  const nDiag=data.filter(d=>d.avaliacao==='DIAGNÓSTICA').length;
  let extra='';
  if(!curAval) extra=`<div class="card ama"><div class="card-val">${nDiag}<small style="font-size:13px"> Diag / </small>${nAMA}<small style="font-size:13px"> AMA</small></div><div class="card-lbl">Distribuição</div></div>`;
  document.getElementById('summ').innerHTML=
    `<div class="card"><div class="card-val">${total}</div><div class="card-lbl">Turmas exibidas</div></div>
     <div class="card mid"><div class="card-val">${avg}%</div><div class="card-lbl">% Médio geral</div></div>
     <div class="card warn"><div class="card-val">${b60}</div><div class="card-lbl">Abaixo de 60%</div></div>
     <div class="card ok"><div class="card-val">${a75}</div><div class="card-lbl">Com 75%+</div></div>${extra}`;
}

function renderHeatmap(data){
  if(!data.length){document.getElementById('vheat').innerHTML='<div class="empty">Nenhuma turma encontrada com os filtros selecionados.</div>';return}
  const keys=[];const seen=new Set();
  data.forEach(d=>Object.keys(d.descritores).forEach(k=>{if(!seen.has(k)){seen.add(k);keys.push(k)}}));
  const showAval=!curAval;
  const showSerie=[...new Set(data.map(d=>d.ano))].length>1;
  const showComp=[...new Set(data.map(d=>d.comp))].length>1;
  let h=`<table><thead><tr><th class="left">Turma</th>`;
  if(showAval)h+=`<th>Avaliação</th>`;
  if(showSerie)h+=`<th>Série</th>`;
  if(showComp)h+=`<th>Disciplina</th>`;
  h+=`<th>% Médio</th><th>Avaliados</th>`;
  keys.forEach(k=>h+=`<th>${k}</th>`);
  h+=`</tr></thead><tbody>`;
  data.forEach(d=>{
    h+=`<tr><td class="left">${d.turma}</td>`;
    if(showAval)h+=`<td>${badge(d.avaliacao)}</td>`;
    if(showSerie)h+=`<td style="font-size:11px;white-space:nowrap">${d.ano}</td>`;
    if(showComp)h+=`<td style="font-weight:700">${d.comp}</td>`;
    const bc=barClr(d.pct_medio);
    h+=`<td style="min-width:110px"><div class="bar-outer"><div class="bar-inner" style="width:${d.pct_medio}%;background:${bc}"></div><span class="bar-label">${d.pct_medio}%</span></div></td>
        <td style="font-size:11px;color:#777">${d.avaliados}/${d.previstos}</td>`;
    keys.forEach(k=>{const v=d.descritores[k];h+=`<td style="background:${cellBg(v)};color:${cellFg(v)}">${v!=null?v+'%':'—'}</td>`});
    h+=`</tr>`;
  });
  h+=`</tbody></table>`;
  document.getElementById('vheat').innerHTML=h;
}

function renderRanking(data){
  if(!data.length){document.getElementById('vrank').innerHTML='<div class="empty">Nenhuma turma encontrada.</div>';return}
  const sorted=[...data].sort((a,b)=>b.pct_medio-a.pct_medio);
  const showAval=!curAval;
  let h='<div class="ranking">';
  sorted.forEach((d,i)=>{
    const bc=barClr(d.pct_medio);
    h+=`<div class="rrow">
      <div class="rnum ${i<3?'top':''}">${i+1}º</div>
      <div class="rinfo">
        <div class="rturma">${d.turma}${showAval?' '+badge(d.avaliacao):''}</div>
        <div class="rsub">${d.ano} · ${COMP_NAMES[d.comp]||d.comp} · ${d.avaliados} avaliados</div>
      </div>
      <div class="rbar"><div class="bar-outer" style="height:20px"><div class="bar-inner" style="width:${d.pct_medio}%;background:${bc}"></div><span class="bar-label" style="top:2px">${d.pct_medio}%</span></div></div>
    </div>`;
  });
  h+='</div>';
  document.getElementById('vrank').innerHTML=h;
}

function renderDesc(data){
  if(!data.length){document.getElementById('vdesc').innerHTML='<div class="empty">Nenhuma turma encontrada.</div>';return}
  const byD={};
  data.forEach(d=>Object.entries(d.descritores).forEach(([k,v])=>{
    if(v==null)return;
    if(!byD[k])byD[k]=[];
    byD[k].push({turma:d.turma,ano:d.ano,comp:d.comp,avaliacao:d.avaliacao,v});
  }));
  const showAval=!curAval;
  let h='<div class="dgrid">';
  Object.entries(byD).sort().forEach(([code,rows])=>{
    const avg=Math.round(rows.reduce((s,r)=>s+r.v,0)/rows.length);
    h+=`<div class="dcard"><div class="dcode">${code}</div>
      <div style="font-size:10px;color:var(--mut);margin:2px 0 5px">Média: <strong style="color:${cellFg(avg)};background:${cellBg(avg)};padding:1px 5px;border-radius:3px">${avg}%</strong></div>
      <div class="dbars">`;
    rows.sort((a,b)=>b.v-a.v).forEach(r=>{
      const lbl=showAval?`${r.turma} (${r.avaliacao.slice(0,4)})`:r.turma;
      h+=`<div class="drow"><div class="dname" title="${r.turma} · ${r.avaliacao}">${lbl}</div>
        <div class="dtrack"><div class="dfill" style="width:${r.v}%;background:${barClr(r.v)}"></div></div>
        <div class="dval" style="color:${cellFg(r.v)}">${r.v}%</div></div>`;
    });
    h+=`</div></div>`;
  });
  h+='</div>';
  document.getElementById('vdesc').innerHTML=h;
}

function renderAll(){
  const data=getFiltered();
  renderSummary(data);
  if(curView==='heatmap')renderHeatmap(data);
  else if(curView==='ranking')renderRanking(data);
  else renderDesc(data);
}

// Avaliação toggle
document.querySelectorAll('.aval-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    curAval=btn.dataset.aval;
    document.querySelectorAll('.aval-btn').forEach(b=>{
      b.classList.remove('active-diag','active-ama');
    });
    if(curAval==='DIAGNÓSTICA')btn.classList.add('active-diag');
    else if(curAval==='AMA')btn.classList.add('active-ama');
    renderAll();
  });
});

// View tabs
document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    curView=t.dataset.v;
    ['vheat','vrank','vdesc'].forEach(id=>document.getElementById(id).classList.toggle('hidden',id!=='v'+curView));
    renderAll();
  });
});

['fano','fcomp','ffil','fsort'].forEach(id=>document.getElementById(id).addEventListener('change',renderAll));

populateFilters();
renderAll();
</script></body></html>
