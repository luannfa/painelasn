<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel de Desempenho — EEEFM ANTONIO DOS SANTOS NEVES</title>
<style>
:root{--bg:#f0f4f8;--card:#fff;--header:#1e3a5f;--accent:#2980b9;--border:#d1dce8;--text:#2c3e50;--muted:#7f8c8d}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text)}
.topbar{background:var(--header);color:#fff;padding:14px 22px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.topbar h1{font-size:16px;font-weight:700;line-height:1.3}
.topbar small{font-size:11px;opacity:.7}
.filters{background:var(--card);padding:14px 22px;display:flex;flex-wrap:wrap;gap:14px;align-items:flex-end;border-bottom:2px solid var(--border);position:sticky;top:0;z-index:100;box-shadow:0 2px 6px rgba(0,0,0,.07)}
.fg{display:flex;flex-direction:column;gap:3px}
.fg label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
select{border:1.5px solid var(--border);border-radius:6px;padding:6px 10px;font-size:13px;color:var(--text);background:#fff;cursor:pointer;min-width:150px}
select:focus{outline:none;border-color:var(--accent)}
.summary{display:flex;gap:10px;padding:14px 22px;flex-wrap:wrap}
.card{background:var(--card);border-radius:10px;padding:12px 16px;flex:1;min-width:110px;box-shadow:0 1px 4px rgba(0,0,0,.08);border-left:4px solid var(--accent)}
.card.warn{border-left-color:#e74c3c}.card.ok{border-left-color:#27ae60}.card.mid{border-left-color:#e67e22}
.card-val{font-size:24px;font-weight:800;color:var(--header)}
.card-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-top:2px}
.main{padding:0 22px 30px}
.tabs{display:flex;gap:3px;padding:14px 0 0}
.tab{padding:7px 16px;border-radius:8px 8px 0 0;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);border-bottom:none;background:#e8edf2;color:var(--muted);transition:all .15s}
.tab.active{background:var(--card);color:var(--header)}
.table-wrap{background:var(--card);border-radius:0 10px 10px 10px;border:1.5px solid var(--border);overflow:auto;max-height:68vh}
.legend{display:flex;gap:10px;align-items:center;padding:8px 0 4px;flex-wrap:wrap;font-size:11px;color:var(--muted)}
.ldot{width:13px;height:13px;border-radius:3px;display:inline-block;vertical-align:middle;margin-right:3px}
table{border-collapse:collapse;width:100%;font-size:12px}
th{background:var(--header);color:#fff;padding:9px 11px;text-align:center;position:sticky;top:0;z-index:10;white-space:nowrap;font-size:11px;border-right:1px solid rgba(255,255,255,.15)}
th.left{text-align:left;min-width:150px;position:sticky;left:0;z-index:20}
td{padding:8px 9px;text-align:center;border-bottom:1px solid var(--border);border-right:1px solid var(--border);font-size:12px;font-weight:600}
td.left{text-align:left;font-weight:700;font-size:13px;position:sticky;left:0;background:#fff;z-index:5;border-right:2px solid var(--border);white-space:nowrap}
tr:hover td{filter:brightness(.96)}
tr:hover td.left{background:#f5f8fb}
.bar-outer{background:#eaecef;border-radius:4px;height:18px;overflow:hidden;position:relative;min-width:110px}
.bar-inner{height:100%;border-radius:4px}
.bar-label{position:absolute;right:5px;top:1px;font-size:11px;font-weight:700;color:#2c3e50}
.ranking{padding:0}
.rrow{display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid var(--border);transition:background .1s}
.rrow:hover{background:#f5f8fb}
.rnum{font-size:17px;font-weight:900;color:var(--border);min-width:30px;text-align:right}
.rnum.top{color:#d68910}
.rinfo{flex:1}.rturma{font-size:14px;font-weight:700}.rsub{font-size:11px;color:var(--muted)}
.rbar{flex:2}.rpct{font-size:18px;font-weight:900;min-width:48px;text-align:right}
.dgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:9px;padding:14px}
.dcard{border-radius:8px;padding:11px 13px;background:#f8fafc;border:1.5px solid var(--border)}
.dcode{font-size:13px;font-weight:800;color:var(--header)}
.dbars{margin-top:7px;display:flex;flex-direction:column;gap:4px}
.drow{display:flex;align-items:center;gap:5px;font-size:11px}
.dname{min-width:95px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dtrack{flex:1;height:11px;background:#e8edf2;border-radius:3px;overflow:hidden}
.dfill{height:100%;border-radius:3px}
.dval{min-width:28px;text-align:right;font-weight:700}
.empty{padding:60px;text-align:center;color:var(--muted);font-size:15px}
.hidden{display:none!important}
</style>
</head>

</div>

const COMP_NAMES={LP:'Língua Portuguesa',MT:'Matemática',CN:'Ciências',GEO:'Geografia',HIS:'História',BIO:'Biologia',FIS:'Física',QUI:'Química'};
const ANO_ORDER=['6º ANO','7º ANO','8º ANO','9º ANO','1ª SÉRIE','2ª SÉRIE','3ª SÉRIE'];

function cellBg(v){if(v==null)return'#e0e0e0';if(v<40)return'#f9b8b0';if(v<60)return'#fce3b4';if(v<75)return'#c5e8cd';return'#8dd4a8'}
function cellFg(v){if(v==null)return'#999';if(v<40)return'#922b21';if(v<60)return'#784212';if(v<75)return'#1e5631';return'#0d3b22'}
function barClr(v){if(v<40)return'#e74c3c';if(v<60)return'#e67e22';if(v<75)return'#27ae60';return'#1a7a4a'}

function getFiltered(){
  const ano=document.getElementById('fano').value;
  const comp=document.getElementById('fcomp').value;
  const fil=document.getElementById('ffiltro').value;
  const srt=document.getElementById('fsort').value;
  let d=DATA.filter(r=>(!ano||r.ano===ano)&&(!comp||r.comp===comp)&&(fil==='all'||(fil==='below60'&&r.pct_medio<60)||(fil==='above60'&&r.pct_medio>=60)));
  if(srt==='turma')d.sort((a,b)=>a.turma.localeCompare(b.turma));
  else if(srt==='asc')d.sort((a,b)=>a.pct_medio-b.pct_medio);
  else d.sort((a,b)=>b.pct_medio-a.pct_medio);
  return d;
}

function populateFilters(){
  const anos=[...new Set(DATA.map(d=>d.ano))].sort((a,b)=>ANO_ORDER.indexOf(a)-ANO_ORDER.indexOf(b));
  const comps=[...new Set(DATA.map(d=>d.comp))].sort();
  const sa=document.getElementById('fano');
  anos.forEach(a=>{const o=document.createElement('option');o.value=a;o.textContent=a;sa.appendChild(o)});
  const sc=document.getElementById('fcomp');
  comps.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c+' — '+(COMP_NAMES[c]||c);sc.appendChild(o)});
}

function renderSummary(data){
  const total=data.length;
  const b60=data.filter(d=>d.pct_medio<60).length;
  const a75=data.filter(d=>d.pct_medio>=75).length;
  const avg=total?Math.round(data.reduce((s,d)=>s+d.pct_medio,0)/total):0;
  document.getElementById('summ').innerHTML=
    `<div class="card"><div class="card-val">${total}</div><div class="card-lbl">Turmas exibidas</div></div>
     <div class="card mid"><div class="card-val">${avg}%</div><div class="card-lbl">% Médio geral</div></div>
     <div class="card warn"><div class="card-val">${b60}</div><div class="card-lbl">Turmas abaixo de 60%</div></div>
     <div class="card ok"><div class="card-val">${a75}</div><div class="card-lbl">Turmas com 75%+</div></div>`;
}

function renderHeatmap(data){
  if(!data.length){document.getElementById('vheat').innerHTML='<div class="empty">Nenhuma turma encontrada.</div>';return}
  const keys=[];const seen=new Set();
  data.forEach(d=>Object.keys(d.descritores).forEach(k=>{if(!seen.has(k)){seen.add(k);keys.push(k)}}));
  const multi=[...new Set(data.map(d=>d.ano+d.comp))].length>1;
  let h=`<table><thead><tr><th class="left">Turma</th>`;
  if(multi)h+=`<th>Série</th><th>Disciplina</th>`;
  h+=`<th>% Médio</th><th>Avaliados</th>`;
  keys.forEach(k=>h+=`<th>${k}</th>`);
  h+=`</tr></thead><tbody>`;
  data.forEach(d=>{
    h+=`<tr><td class="left">${d.turma}</td>`;
    if(multi)h+=`<td style="font-size:11px;white-space:nowrap">${d.ano}</td><td style="font-weight:700">${d.comp}</td>`;
    const bc=barClr(d.pct_medio);
    h+=`<td style="min-width:115px"><div class="bar-outer"><div class="bar-inner" style="width:${d.pct_medio}%;background:${bc}"></div><span class="bar-label">${d.pct_medio}%</span></div></td>
        <td style="font-size:11px;color:#777">${d.avaliados}/${d.previstos}</td>`;
    keys.forEach(k=>{const v=d.descritores[k];h+=`<td style="background:${cellBg(v)};color:${cellFg(v)}">${v!=null?v+'%':'—'}</td>`});
    h+=`</tr>`;
  });
  h+=`</tbody></table>`;
  document.getElementById('vheat').innerHTML=h;
}

function renderRanking(data){
  if(!data.length){document.getElementById('vrank').innerHTML='<div class="empty">Nenhuma turma encontrada.</div>';return}
  const sorted=[...data].sort((a,b)=>b.pct_medio-a.pct_medio);
  let h='<div class="ranking">';
  sorted.forEach((d,i)=>{
    const bc=barClr(d.pct_medio);
    h+=`<div class="rrow">
      <div class="rnum ${i<3?'top':''}">${i+1}º</div>
      <div class="rinfo"><div class="rturma">${d.turma}</div><div class="rsub">${d.ano} · ${COMP_NAMES[d.comp]||d.comp} · ${d.avaliados} avaliados</div></div>
      <div class="rbar"><div class="bar-outer" style="height:20px"><div class="bar-inner" style="width:${d.pct_medio}%;background:${bc}"></div><span class="bar-label" style="top:2px">${d.pct_medio}%</span></div></div>
    </div>`;
  });
  h+='</div>';
  document.getElementById('vrank').innerHTML=h;
}

function renderDesc(data){
  if(!data.length){document.getElementById('vdesc').innerHTML='<div class="empty">Nenhuma turma encontrada.</div>';return}
  const byD={};
  data.forEach(d=>Object.entries(d.descritores).forEach(([k,v])=>{
    if(v==null)return;
    if(!byD[k])byD[k]=[];
    byD[k].push({turma:d.turma,ano:d.ano,comp:d.comp,v});
  }));
  let h='<div class="dgrid">';
  Object.entries(byD).sort().forEach(([code,rows])=>{
    const avg=Math.round(rows.reduce((s,r)=>s+r.v,0)/rows.length);
    h+=`<div class="dcard"><div class="dcode">${code}</div>
      <div style="font-size:10px;color:var(--muted);margin:2px 0 6px">Média: <strong style="color:${cellFg(avg)};background:${cellBg(avg)};padding:1px 5px;border-radius:3px">${avg}%</strong></div>
      <div class="dbars">`;
    rows.sort((a,b)=>b.v-a.v).forEach(r=>{
      h+=`<div class="drow"><div class="dname" title="${r.turma}">${r.turma}</div>
        <div class="dtrack"><div class="dfill" style="width:${r.v}%;background:${barClr(r.v)}"></div></div>
        <div class="dval" style="color:${cellFg(r.v)}">${r.v}%</div></div>`;
    });
    h+=`</div></div>`;
  });
  h+='</div>';
  document.getElementById('vdesc').innerHTML=h;
}

let curView='heatmap';
function renderAll(){
  const data=getFiltered();
  renderSummary(data);
  if(curView==='heatmap')renderHeatmap(data);
  else if(curView==='ranking')renderRanking(data);
  else renderDesc(data);
}

document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    curView=t.dataset.v;
    ['vheat','vrank','vdesc'].forEach(id=>document.getElementById(id).classList.toggle('hidden',id!=='v'+curView));
    renderAll();
  });
});
['fano','fcomp','ffiltro','fsort'].forEach(id=>document.getElementById(id).addEventListener('change',renderAll));

populateFilters();
renderAll();
</script></body></html>
